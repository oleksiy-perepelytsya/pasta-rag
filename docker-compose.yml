version: '3.8'

services:
  bot:
    build: .
    container_name: pasta-rag-bot
    env_file: .env
    depends_on:
      mongodb:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    restart: unless-stopped
    command: python -m bot.main

  mongodb:
    image: mongo:7
    container_name: pasta-rag-mongodb
    volumes:
      - mongodb_data:/data/db
    command: mongod --bind_ip_all --wiredTigerCacheSizeGB 0.25
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  chromadb:
    image: chromadb/chroma:latest
    container_name: pasta-rag-chromadb
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mongodb_data:
  chroma_data:
